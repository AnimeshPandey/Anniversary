<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#C0185F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Anniversary">
  <title>Happy Anniversary - A Journey Through Our First Year</title>
  <meta name="description" content="A journey through our first year together, an intimate anniversary experience.">
  <link rel="canonical" href="https://anmshpndy.com/happy-anniversary/">
  <!-- Open Graph -->
  <meta property="og:site_name"   content="Happy Anniversary">
  <meta property="og:title"       content="Happy Anniversary">
  <meta property="og:description" content="A journey through our first year together.">
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://anmshpndy.com/happy-anniversary/">
  <meta property="og:locale"      content="en_GB">
  <!-- og:image — add a 1200×630 PNG at og-image.png to enable rich link previews -->
  <!-- Twitter / X Card -->
  <meta name="twitter:card"        content="summary">
  <meta name="twitter:title"       content="Happy Anniversary">
  <meta name="twitter:description" content="A journey through our first year together.">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&display=swap" as="style" onload="this.rel='stylesheet'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"></noscript>
  <link rel="stylesheet" href="style.css">
  <noscript>
    <style>
      .reveal { opacity: 1 !important; transform: none !important; }
      #theme-selector, #ceremony { display: none !important; }
      .petal { display: none !important; }
    </style>
  </noscript>
</head>
<body>

  <!-- Skip nav -->
  <a href="#journey" class="skip-link">Skip to story</a>

  <!-- Grain texture overlay -->
  <div id="grain-layer" aria-hidden="true"></div>

  <!-- Scroll progress bar -->
  <div id="scroll-progress" aria-hidden="true"></div>

  <!-- Portal transition overlay (bloom-to-journey) -->
  <div id="portal-overlay" aria-hidden="true"></div>

  <!-- Falling petals -->
  <div id="petals-layer" aria-hidden="true"></div>

  <!-- Pull-to-restart indicator -->
  <div id="pull-restart-indicator" aria-hidden="true">
    <span class="pull-icon">↺</span>
    <span class="pull-label">Release to restart</span>
  </div>

  <!-- ── Phase 0a: Theme Selector (every page load) ──────────────── -->
  <section id="theme-selector" aria-label="Choose a theme for your journey">
    <div class="ts-bg" aria-hidden="true"></div>

    <div class="ts-inner">
      <p class="ts-dedication">for Divya, with love</p>
      <p class="ts-label">Choose Our Love Mood</p>

      <div class="ts-orb-area">
        <button class="ts-nav-btn ts-nav-prev" id="ts-prev-btn" type="button" aria-label="Previous mood">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div class="ts-orb-wrap" id="ts-orb-wrap" aria-label="Tap or swipe to explore moods">
          <div class="ts-orb" aria-hidden="true"></div>
          <button class="ts-surprise-btn" id="ts-surprise-btn" type="button" aria-label="Surprise me with a mood">✦</button>
        </div>
        <button class="ts-nav-btn ts-nav-next" id="ts-next-btn" type="button" aria-label="Next mood">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>

      <div class="ts-content">
        <span class="ts-icon" id="ts-icon" aria-hidden="true"></span>
        <h2 class="ts-name"    id="ts-name"></h2>
        <p  class="ts-tagline" id="ts-tagline"></p>
      </div>

      <div class="ts-dots" id="ts-dots" role="group" aria-label="Theme options"></div>

      <button class="ts-start-btn" id="ts-start-btn" type="button" aria-label="Begin our journey">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="12" y1="5" x2="12" y2="19"/><polyline points="6 13 12 19 18 13"/>
        </svg>
      </button>
    </div>

    <!-- Theme preview bubble (shown on dot hover) -->
    <div id="ts-preview-bubble" aria-hidden="true" hidden>
      <span id="ts-preview-name"></span>
    </div>

    <div class="sr-only" aria-live="polite" aria-atomic="true" id="ts-announce"></div>
  </section>

  <!-- ── Phase 0b: Opening Ceremony ─────────────────────────────── -->
  <section id="ceremony" aria-label="Opening ceremony">
    <div class="ceremony-inner">
      <div class="ceremony-bloom" aria-hidden="true">
        <div class="bloom-center"></div>
        <div class="bloom-petal" style="--rot:0deg;   --delay:0.40s"></div>
        <div class="bloom-petal" style="--rot:45deg;  --delay:0.47s"></div>
        <div class="bloom-petal" style="--rot:90deg;  --delay:0.54s"></div>
        <div class="bloom-petal" style="--rot:135deg; --delay:0.61s"></div>
        <div class="bloom-petal" style="--rot:180deg; --delay:0.68s"></div>
        <div class="bloom-petal" style="--rot:225deg; --delay:0.75s"></div>
        <div class="bloom-petal" style="--rot:270deg; --delay:0.82s"></div>
        <div class="bloom-petal" style="--rot:315deg; --delay:0.89s"></div>
      </div>
      <h1 class="ceremony-title"     id="ceremony-heading">Happy Anniversary</h1>
      <p  class="ceremony-recipient" id="ceremony-recipient"></p>
      <p  class="ceremony-date"      id="ceremony-date">One beautiful year</p>
      <p  class="ceremony-days"      id="ceremony-days" aria-live="polite"></p>

      <div class="begin-btn-wrap">
        <button class="begin-btn" id="begin-btn" aria-label="Begin the journey">Begin</button>
        <svg class="begin-countdown-ring" viewBox="0 0 64 64" aria-hidden="true">
          <circle class="countdown-circle" id="countdown-circle" cx="32" cy="32" r="30"/>
        </svg>
      </div>
      <p class="begin-hint" id="begin-hint">tap when you are ready</p>
    </div>
  </section>

  <!-- Scroll-direction chapter header -->
  <header id="chapter-header" aria-label="Current chapter" aria-hidden="true">
    <span id="chapter-header-num"></span>
    <span id="chapter-header-title"></span>
  </header>

  <!-- ── Main Journey ────────────────────────────────────────────── -->
  <main id="journey" aria-label="Anniversary journey">

    <section id="opening" aria-label="Opening">
      <div class="opening-poem reveal">
        <p id="opening-poem-text"></p>
        <svg class="poem-underline" viewBox="0 0 320 20" aria-hidden="true" preserveAspectRatio="none">
          <path id="poem-underline-path" d="M10 12 Q80 3 160 12 Q240 21 310 12"
            fill="none" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <div id="opening-panels" role="region" aria-label="Opening panels"></div>
    </section>

    <div class="floral-divider" aria-hidden="true">
      <svg viewBox="0 0 500 50" xmlns="http://www.w3.org/2000/svg">
        <line x1="0" y1="25" x2="192" y2="25" class="fd-line" stroke="#D4A017" stroke-width="0.8" stroke-dasharray="3 5" opacity="0.55"/>
        <ellipse cx="216" cy="25" rx="8" ry="5" class="fd-petal" fill="#F4A0B0" opacity="0.65" transform="rotate(-30 216 25)"/>
        <circle  cx="250" cy="25" r="7" class="fd-center" fill="#C0185F" opacity="0.65"/>
        <circle  cx="250" cy="25" r="3.5" class="fd-center-dot" fill="#D4A017" opacity="0.95"/>
        <ellipse cx="284" cy="25" rx="8" ry="5" class="fd-petal" fill="#F4A0B0" opacity="0.65" transform="rotate(30 284 25)"/>
        <circle  cx="230" cy="25" r="2" class="fd-accent" fill="#D4A017" opacity="0.45"/>
        <circle  cx="270" cy="25" r="2" class="fd-accent" fill="#D4A017" opacity="0.45"/>
        <line x1="308" y1="25" x2="500" y2="25" class="fd-line" stroke="#D4A017" stroke-width="0.8" stroke-dasharray="3 5" opacity="0.55"/>
      </svg>
    </div>

    <section id="chapters" aria-label="Memory chapters">
      <div id="chapters-container"></div>
    </section>

    <div class="floral-divider" aria-hidden="true">
      <svg viewBox="0 0 500 50" xmlns="http://www.w3.org/2000/svg">
        <line x1="0" y1="25" x2="192" y2="25" class="fd-line" stroke="#D4A017" stroke-width="0.8" stroke-dasharray="3 5" opacity="0.55"/>
        <ellipse cx="216" cy="25" rx="8" ry="5" class="fd-petal" fill="#F4A0B0" opacity="0.65" transform="rotate(-30 216 25)"/>
        <circle  cx="250" cy="25" r="7" class="fd-center" fill="#C0185F" opacity="0.65"/>
        <circle  cx="250" cy="25" r="3.5" class="fd-center-dot" fill="#D4A017" opacity="0.95"/>
        <ellipse cx="284" cy="25" rx="8" ry="5" class="fd-petal" fill="#F4A0B0" opacity="0.65" transform="rotate(30 284 25)"/>
        <circle  cx="230" cy="25" r="2" class="fd-accent" fill="#D4A017" opacity="0.45"/>
        <circle  cx="270" cy="25" r="2" class="fd-accent" fill="#D4A017" opacity="0.45"/>
        <line x1="308" y1="25" x2="500" y2="25" class="fd-line" stroke="#D4A017" stroke-width="0.8" stroke-dasharray="3 5" opacity="0.55"/>
      </svg>
    </div>

    <section id="crescendo" aria-label="Anniversary message">
      <div id="crescendo-burst" aria-hidden="true"></div>
      <div class="crescendo-inner">
        <div class="crescendo-text reveal">
          <p class="crescendo-line reveal-child"                    id="crescendo-line1"></p>
          <p class="crescendo-line reveal-child"                    id="crescendo-line2"></p>
          <p class="crescendo-line crescendo-highlight reveal-child" id="crescendo-line3"></p>
        </div>
      </div>
    </section>

    <section id="closing" aria-label="Closing">
      <div class="closing-inner">
        <div class="closing-image-wrap reveal" id="closing-image-wrap"></div>
        <div class="closing-text reveal">
          <p class="closing-message" id="closing-message"></p>
          <p class="closing-signoff" id="closing-signoff"></p>
        </div>
        <div class="heart-wrap" aria-label="Tap to celebrate">
          <svg class="heart-svg" viewBox="0 0 100 92" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Heart">
            <path id="heart-path"
              d="M50 84 C47 81 8 59 8 34 C8 20 18 10 30 10 C38 10 45 14 50 21 C55 14 62 10 70 10 C82 10 92 20 92 34 C92 59 53 81 50 84 Z"
              stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </svg>
        </div>

        <div id="replay-wrap">
          <button id="replay-btn" type="button">↺ Begin Again</button>
        </div>
      </div>
    </section>

  </main>

  <!-- ── Fixed UI ─────────────────────────────────────────────────── -->
  <nav id="chapter-nav" aria-label="Chapter navigation" hidden></nav>

  <button id="sound-toggle" type="button" aria-label="Play ambient music" hidden>♪</button>

  <button id="share-btn" type="button" aria-label="Share this experience" hidden>
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
      <polyline points="16 6 12 2 8 6"/>
      <line x1="12" y1="2" x2="12" y2="15"/>
    </svg>
  </button>

  <!-- TOC bottom sheet -->
  <div id="toc-sheet" hidden>
    <div id="toc-backdrop"></div>
    <div id="toc-content" role="dialog" aria-modal="true" aria-label="Table of contents">
      <div id="toc-handle" aria-hidden="true"></div>
      <h2 id="toc-heading">Our Story</h2>
      <ol id="toc-list"></ol>
    </div>
  </div>

  <!-- Orientation lock guidance -->
  <div id="orientation-overlay" role="alertdialog" aria-modal="true"
       aria-label="Please rotate your device" hidden>
    <div class="orient-icon" aria-hidden="true">📱</div>
    <p>This experience is best in portrait mode. Please rotate your device.</p>
  </div>

  <!-- Ambient audio -->
  <audio id="ambient-audio" loop preload="none" aria-hidden="true">
    <source src="ambient.mp3" type="audio/mpeg">
  </audio>

  <script src="content.js"></script>
  <script src="themes.js"></script>
  <script src="theme-controller.js"></script>
  <script src="main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(function () {});
    }
  </script>
</body>
</html>
