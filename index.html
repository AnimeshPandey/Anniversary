<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">

  <title>Happy Anniversary</title>

  <!-- Open Graph — for link preview in iMessage / WhatsApp -->
  <meta property="og:title"       content="Happy Anniversary">
  <meta property="og:description" content="A journey through our first year together.">
  <meta property="og:type"        content="website">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <!-- No-JS: reveal everything and skip ceremony -->
  <noscript>
    <style>
      .reveal { opacity: 1 !important; transform: none !important; }
      #ceremony { display: none !important; }
      .petal { display: none !important; }
    </style>
  </noscript>
</head>
<body>

  <!-- Falling petals (fixed layer, aria-hidden) -->
  <div id="petals-layer" aria-hidden="true"></div>

  <!-- ── Phase 0: Opening Ceremony ────────────────────────────── -->
  <section id="ceremony" aria-label="Opening ceremony" aria-live="polite">
    <div class="ceremony-inner">

      <!-- Flower bloom -->
      <div class="ceremony-bloom" aria-hidden="true">
        <div class="bloom-center"></div>
        <div class="bloom-petal" style="--rot:0deg;   --delay:0.40s"></div>
        <div class="bloom-petal" style="--rot:45deg;  --delay:0.47s"></div>
        <div class="bloom-petal" style="--rot:90deg;  --delay:0.54s"></div>
        <div class="bloom-petal" style="--rot:135deg; --delay:0.61s"></div>
        <div class="bloom-petal" style="--rot:180deg; --delay:0.68s"></div>
        <div class="bloom-petal" style="--rot:225deg; --delay:0.75s"></div>
        <div class="bloom-petal" style="--rot:270deg; --delay:0.82s"></div>
        <div class="bloom-petal" style="--rot:315deg; --delay:0.89s"></div>
      </div>

      <h1 class="ceremony-title" id="ceremony-heading">Happy Anniversary</h1>
      <p  class="ceremony-date"  id="ceremony-date">One beautiful year</p>

      <button class="begin-btn" id="begin-btn" aria-label="Begin the journey">
        Begin
      </button>
    </div>
  </section>

  <!-- ── Main Journey ──────────────────────────────────────────── -->
  <main id="journey" aria-label="Anniversary journey">

    <!-- Phase 1: Opening -->
    <section id="opening" aria-label="Opening">
      <div class="opening-poem reveal">
        <p id="opening-poem-text"></p>
      </div>
      <div id="opening-panels" role="region" aria-label="Opening panels"></div>
    </section>

    <!-- Floral divider -->
    <div class="floral-divider" aria-hidden="true">
      <svg viewBox="0 0 500 50" xmlns="http://www.w3.org/2000/svg">
        <line x1="0"   y1="25" x2="192" y2="25" stroke="#D4A017" stroke-width="0.8" stroke-dasharray="3 5" opacity="0.55"/>
        <ellipse cx="216" cy="25" rx="8" ry="5" fill="#F4A0B0" opacity="0.65" transform="rotate(-30 216 25)"/>
        <circle  cx="250" cy="25" r="7"          fill="#C0185F" opacity="0.65"/>
        <circle  cx="250" cy="25" r="3.5"        fill="#D4A017" opacity="0.95"/>
        <ellipse cx="284" cy="25" rx="8" ry="5"  fill="#F4A0B0" opacity="0.65" transform="rotate(30 284 25)"/>
        <circle  cx="230" cy="25" r="2"           fill="#D4A017" opacity="0.45"/>
        <circle  cx="270" cy="25" r="2"           fill="#D4A017" opacity="0.45"/>
        <line x1="308" y1="25" x2="500" y2="25" stroke="#D4A017" stroke-width="0.8" stroke-dasharray="3 5" opacity="0.55"/>
      </svg>
    </div>

    <!-- Phase 2: Memory Chapters -->
    <section id="chapters" aria-label="Memory chapters">
      <div id="chapters-container"></div>
    </section>

    <!-- Floral divider -->
    <div class="floral-divider" aria-hidden="true">
      <svg viewBox="0 0 500 50" xmlns="http://www.w3.org/2000/svg">
        <line x1="0"   y1="25" x2="192" y2="25" stroke="#D4A017" stroke-width="0.8" stroke-dasharray="3 5" opacity="0.55"/>
        <ellipse cx="216" cy="25" rx="8" ry="5" fill="#F4A0B0" opacity="0.65" transform="rotate(-30 216 25)"/>
        <circle  cx="250" cy="25" r="7"          fill="#C0185F" opacity="0.65"/>
        <circle  cx="250" cy="25" r="3.5"        fill="#D4A017" opacity="0.95"/>
        <ellipse cx="284" cy="25" rx="8" ry="5"  fill="#F4A0B0" opacity="0.65" transform="rotate(30 284 25)"/>
        <circle  cx="230" cy="25" r="2"           fill="#D4A017" opacity="0.45"/>
        <circle  cx="270" cy="25" r="2"           fill="#D4A017" opacity="0.45"/>
        <line x1="308" y1="25" x2="500" y2="25" stroke="#D4A017" stroke-width="0.8" stroke-dasharray="3 5" opacity="0.55"/>
      </svg>
    </div>

    <!-- Phase 3: Crescendo -->
    <section id="crescendo" aria-label="Anniversary message">
      <div class="crescendo-inner">
        <div class="crescendo-text reveal">
          <p class="crescendo-line"            id="crescendo-line1"></p>
          <p class="crescendo-line"            id="crescendo-line2"></p>
          <p class="crescendo-line crescendo-highlight" id="crescendo-line3"></p>
        </div>
      </div>
    </section>

    <!-- Phase 4: Closing -->
    <section id="closing" aria-label="Closing">
      <div class="closing-inner">
        <div class="closing-image-wrap reveal" id="closing-image-wrap"></div>
        <div class="closing-text reveal">
          <p class="closing-message"  id="closing-message"></p>
          <p class="closing-signoff"  id="closing-signoff"></p>
        </div>
        <!-- SVG heart draws itself on scroll -->
        <div class="heart-wrap" aria-hidden="true">
          <svg class="heart-svg" viewBox="0 0 100 92" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path id="heart-path"
              d="M50 84 C47 81 8 59 8 34 C8 20 18 10 30 10 C38 10 45 14 50 21 C55 14 62 10 70 10 C82 10 92 20 92 34 C92 59 53 81 50 84 Z"
              stroke="#C0185F"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              fill="none"
            />
          </svg>
        </div>
      </div>
    </section>

  </main><!-- /journey -->

  <script src="content.js"></script>
  <script src="main.js"></script>
</body>
</html>
